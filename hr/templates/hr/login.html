{% load static %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Yayasan Pelita Doktora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Import Font Inter seperti di desain referensi -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<!-- Gradient Background menyesuaikan image_3376dc.jpg -->
<body class="bg-gradient-to-br from-[#1C7954] via-[#4D8C57] to-[#A29A42] min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-xl shadow-2xl w-full max-w-md p-8 md:p-10 relative">
        
        <!-- HEADER / LOGO -->
        <div class="text-center mb-8 flex flex-col items-center justify-center">
            <img src="{% static 'img/logo.png' %}" alt="Logo Yayasan" class="h-16 mb-4">
            <h2 class="text-xl md:text-2xl font-black text-gray-900 tracking-tight">Yayasan Pelita Doktora</h2>
        </div>

        <!-- PESAN ERROR -->
        {% if messages %}
            {% for message in messages %}
                <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-lg mb-6 text-sm font-semibold text-center shadow-sm">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <!-- FORM LOGIN -->
        <form action="" method="POST" class="space-y-5">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-bold text-gray-800 mb-1.5">Username</label>
                <input type="text" name="username" class="w-full px-4 py-2.5 border border-gray-400 rounded-md focus:outline-none focus:ring-2 focus:ring-[#147A53] font-medium transition" placeholder="1234567890" required>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-800 mb-1.5">Password</label>
                <input type="password" name="password" class="w-full px-4 py-2.5 border border-gray-400 rounded-md focus:outline-none focus:ring-2 focus:ring-[#147A53] font-medium transition" placeholder="••••••••••" required>
            </div>

            <!-- CHECKBOX REMEMBER ME -->
            <div class="flex items-center pt-1">
                <input type="checkbox" id="remember" class="w-4 h-4 text-[#F58220] bg-white border-gray-400 rounded focus:ring-[#F58220] accent-[#F58220] cursor-pointer">
                <label for="remember" class="ml-2 text-sm font-semibold text-gray-700 cursor-pointer select-none">Remember Me</label>
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full bg-[#F58220] hover:bg-orange-600 text-white font-bold py-3 rounded-md transition shadow-md">
                    Login
                </button>
            </div>
            
        </form>
    </div>

</body>
</html>
